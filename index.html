<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rised Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            margin: 0;
            padding: 15px;
        }
        .brand-title {
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-align: center;
        }
        .products-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .product-card {
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .product-img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            border-radius: 8px;
        }
        .product-name {
            font-size: 14px;
            font-weight: 600;
            margin: 8px 0 4px 0;
        }
        .product-price {
            font-size: 13px;
            font-weight: bold;
            color: var(--tg-theme-button-color, #000);
            margin-bottom: 8px;
        }
        .btn-add {
            background-color: var(--tg-theme-button-color, #000);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 8px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="brand-title">RISED</div>

    <div class="products-grid">
        <div class="product-card" id="prod_1">
            <img src="https://link-to-your-photo.com/item1.jpg" class="product-img" alt="Товар">
            <div class="product-name">Футболка Размахайка Black</div>
            <div class="product-price">3 500 ₽</div>
            <button class="btn-add" onclick="addToCart(1, 'Футболка Размахайка', 3500)">В корзину</button>
        </div>
        
        <div class="product-card" id="prod_2">
            <img src="https://link-to-your-photo.com/item2.jpg" class="product-img" alt="Товар">
            <div class="product-name">Зип-худи Athletic</div>
            <div class="product-price">6 200 ₽</div>
            <button class="btn-add" onclick="addToCart(2, 'Зип-худи Athletic', 6200)">В корзину</button>
        </div>
    </div>

    <script>
       // Инициализация Telegram WebApp
const tg = window.Telegram.WebApp;

// Функция, которая гарантирует, что WebApp полностью готов на iOS
function initializeWebApp() {
    tg.ready();
    tg.expand(); // Разворачиваем на весь экран
}

// Запускаем инициализацию сразу
initializeWebApp();

let cart = [];

function addToCart(id, name, price) {
    cart.push({ id, name, price });
    
    // Настраиваем главную кнопку Telegram
    tg.MainButton.text = `Посмотреть корзину (${cart.length})`;
    tg.MainButton.textColor = tg.themeParams.button_text_color || '#ffffff';
    tg.MainButton.color = tg.themeParams.button_color || '#000000';
    tg.MainButton.show();
}

// Железобетонный обработчик клика для iPhone
// Надежный обработчик для тестов на ПК и смартфонах
tg.onEvent('mainButtonClicked', function() {
    try {
        if (cart.length > 0) {
            // Создаем объект заказа и добавляем уникальную метку времени (timestamp)
            const order = {
                order_id: Date.now(), // Это сделает каждый запрос уникальным для Telegram
                items: cart
            };
            
            // Отправляем уникальную строку в бот
            tg.sendData(JSON.stringify(order));
        }
    } catch (error) {
        alert("Ошибка: " + error.message);
    } finally {
        tg.close();
    }
});
    </script>
</body>
</html>
